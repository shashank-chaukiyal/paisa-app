version: "3.9"

# Paisa — Mobile Finance Tracker
# Local dev stack: FastAPI · PostgreSQL · Redis · MinIO · Flower

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: paisa_api
    ports: ["8000:8000"]
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://paisa:paisa@db:5432/paisa
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: paisa_worker
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://paisa:paisa@db:5432/paisa
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      - db
      - redis
    command: >
      celery -A app.workers.celery_app worker
      --loglevel=info
      --concurrency=4
      --queues=sms_processing,notifications,sync
      --max-tasks-per-child=100
    restart: unless-stopped

  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: paisa_beat
    env_file: ./backend/.env
    volumes:
      - ./backend:/app
    depends_on: [redis]
    command: celery -A app.workers.celery_app beat --loglevel=info
    restart: unless-stopped

  flower:
    image: mher/flower:2.0
    container_name: paisa_flower
    ports: ["5555:5555"]
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on: [redis, worker]

  db:
    image: postgres:16-alpine
    container_name: paisa_db
    ports: ["5432:5432"]
    environment:
      POSTGRES_USER: paisa
      POSTGRES_PASSWORD: paisa
      POSTGRES_DB: paisa
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paisa"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: paisa_redis
    ports: ["6379:6379"]
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: paisa_minio
    ports: ["9000:9000", "9001:9001"]
    environment:
      MINIO_ROOT_USER: paisa_minio
      MINIO_ROOT_PASSWORD: paisa_minio_secret
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

volumes:
  pg_data:
  redis_data:
  minio_data:
